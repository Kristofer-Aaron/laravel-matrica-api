<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Laravel Matrica Api</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container py-4">
        
        <div id="alert" class="alert" role="alert" style="display:none;"></div>

        <div class="border rounded p-3">
            <form id="vignette-form" class="mb-5">
                <h2 class="h4 mb-3">Add/Edit Vignettes</h2>
                <input type="hidden" id="vignette-id" />
                <div class="row g-3">
                    <div class="col-md-3">
                        <label for="vehicle_id" class="form-label">Vehicle ID</label>
                        <input id="vehicle_id" type="number" class="form-control" required min="1"/>
                    </div>
                    <div class="col-md-3">
                        <label for="type" class="form-label">Type</label>
                        <input id="type" class="form-control" required />
                    </div>
                    <div class="col-md-3">
                        <label for="category" class="form-label">Category</label>
                        <input id="category" class="form-control" required />
                    </div>
                    <div class="col-md-3">
                        <label for="region" class="form-label">Region</label>
                        <input id="region" class="form-control" placeholder="leave empty for country vignettes"/>
                    </div>
                </div>
                <div class="row g-3 mt-1">
                    <div class="col-md-3">
                        <label for="year" class="form-label">Year</label>
                        <input id="year" type="number" class="form-control" required />
                    </div>
                    <div class="col-md-3">
                        <label for="valid_from" class="form-label">Valid From</label>
                        <input id="valid_from" type="date" class="form-control" required />
                    </div>
                    <div class="col-md-3">
                        <label for="valid_to" class="form-label">Valid To</label>
                        <input id="valid_to" type="date" class="form-control" required />
                    </div>
                    <div class="col-md-3 d-flex align-items-end">
                        <button type="submit" id="save-btn" class="btn btn-primary me-2">Create</button>
                        <button type="button" id="cancel-btn" class="btn btn-secondary">Clear</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="table-responsive border rounded p-0 mt-4">
            <table id="vignettes-table" class="table table-striped table-hover">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Vehicle ID</th>
                        <th>Type</th>
                        <th>Category</th>
                        <th>Region</th>
                        <th>Year</th>
                        <th>Valid From</th>
                        <th>Valid To</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>


    <!-- JavaScript -->
    <script src="./script.js"></script>
    <script>
        // override showAlert to use bootstrap classes
        const originalShow = showAlert;
        showAlert = function(message, type='success'){
            const alertEl = document.getElementById('alert');
            alertEl.textContent = message;
            alertEl.className = `alert alert-${type}`;
            alertEl.style.display = 'block';
            setTimeout(()=>{ alertEl.style.display = 'none'; }, 4000);
        };
    </script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
